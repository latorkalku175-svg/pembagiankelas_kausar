services:
  - type: web
    name: gurukelas
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn gurukelas_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: gurukelas-db
          property: connectionString

databases:
  - name: gurukelas-db
    plan: free
