{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}GuruKelas{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { brand: {
    50: '#F1F0FE', 100: '#E3E1FD', 400: '#8B7CF6', 500: '#6C5CE7', 600: '#5B4BD6', 700: '#4A3CB8',
  } } } } }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;}</style>
</head>
<body class="min-h-screen bg-[#FAFAFB] flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 shadow-lg mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-7 w-7 text-white">
          <path d="M12 3 1.5 8.25 12 13.5l9.5-5.25L12 3Z" fill="currentColor"/>
          <path d="M5.25 11.25v4.5c0 .7 2.84 2.75 6.75 2.75s6.75-2.05 6.75-2.75v-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21.5 8.25v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <h1 class="text-xl font-extrabold"><span class="text-gray-900">Guru</span><span class="text-brand-500">Kelas</span></h1>
      <p class="text-sm text-gray-400 mt-1">Kelola kelas jadi lebih mudah</p>
    </div>

    <div class="card bg-white rounded-2xl border border-gray-100 shadow-sm p-7">
      {% block auth_content %}{% endblock %}
    </div>

    <p class="mt-5 text-center text-xs text-gray-400">
      <a href="{% url 'dashboard:login' %}" class="font-medium text-brand-500 hover:text-brand-700 transition-colors">&larr; Kembali ke halaman masuk</a>
    </p>
  </div>

</body>
</html>
