{% extends "dashboard/auth/_auth_base.html" %}
{% block title %}Password Berhasil Diubah · GuruKelas{% endblock %}

{% block auth_content %}
  <div class="flex justify-center mb-4">
    <span class="flex h-12 w-12 items-center justify-center rounded-full bg-green-50 text-green-500">
      <svg viewBox="0 0 24 24" fill="none" class="h-6 w-6"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="m8.5 12 2.5 2.5 4.5-4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </div>

  <h2 class="text-lg font-bold text-gray-900 mb-1 text-center">Password Berhasil Diubah</h2>
  <p class="text-sm text-gray-400 mb-6 text-center">
    Password baru Anda sudah aktif. Silakan masuk menggunakan password baru tersebut.
  </p>

  <a href="{% url 'dashboard:login' %}" class="block w-full rounded-xl bg-brand-500 py-2.5 text-center text-sm font-semibold text-white hover:bg-brand-600 transition-colors">
    Masuk Sekarang
  </a>
{% endblock %}
